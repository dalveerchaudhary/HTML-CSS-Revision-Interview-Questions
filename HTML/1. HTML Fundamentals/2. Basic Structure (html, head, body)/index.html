<!-- <html> </html> -->
<!-- // This is the root element HTML document top-level container -->

<!-- <head></head> -->
<!-- // Placed inside the <html> tag and before the <body> tag, <head> element contains metadata (information about the data)
     that is not displaye webpage. -->

<!-- <body></body> -->
<!-- // This element contains all the visible content of the web page that users will see browser -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body></body>
</html>
